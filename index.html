<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polska Federacja Futbolu</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="https://media.discordapp.net/attachments/1372290075630506006/1451311855028015234/czarnepff_1.png?ex=6947b13e&is=69465fbe&hm=b4d591f635c997341128820dd1a9d62c903592fa48ea3587099593bad329ee9d&=&format=webp&quality=lossless&width=930&height=930" alt="PFF Logo">
            Polska Federacja Futbolu
        </div>
        <ul class="nav-links">
            <li><a href="#" onclick="showView('news')" class="active nav-item" id="nav-news">Aktualności</a></li>
            <li><a href="#" onclick="showView('schedule')" class="nav-item" id="nav-schedule">Terminarz</a></li>
            <li><a href="#" onclick="showView('table')" class="nav-item" id="nav-table">Tabela</a></li>
            <li><a href="#" onclick="scrollToSidebar()">Rozgrywki</a></li>
        </ul>
        <div class="navbar-search">
            <input type="text" id="navbar-player-search" class="navbar-search-input" placeholder="Wyszukaj zawodnika..." onkeyup="filterPlayersNavbar()">
            <div id="navbar-search-results" class="navbar-search-results"></div>
        </div>
        <div class="season-selector">
            <span class="season-label">Wybierz sezon</span>
            <div class="season-value">2025/2026 <span class="arrow">▼</span></div>
        </div>
    </nav>

    <!-- Countdown Banner -->
    <div id="main-countdown-banner" class="countdown-banner"></div>

    <div class="main-layout" id="news-view">
        <!-- Lewa strona: Newsy -->
        <div class="news-section">
            <div class="hero-news" id="hero-news">
                <!-- Wypełniane przez JS -->
            </div>
            <div class="news-grid" id="news-grid">
                <!-- Mniejsze newsy -->
            </div>
        </div>

        <!-- Prawa strona: Widget (Tabela/Terminarz) -->
        <div class="sidebar-widget">
            <div class="sidebar-header">
                <button class="sidebar-tab active" onclick="switchSidebar('terminarz')">TERMINARZ</button>
                <button class="sidebar-tab" onclick="switchSidebar('tabela')">TABELA</button>
            </div>
            <div id="sidebar-content" class="sidebar-content">
                <!-- Wypełniane przez JS -->
            </div>
        </div>
    </div>

    <div class="main-layout" id="table-view" style="display: none;">
        <div class="full-table-container">
            <div class="table-header-banner">
                <img src="https://i.ibb.co/fgf9xk7/ekstraklasabaner-removebg-preview.png" alt="Ekstraklasa Banner" style="width: 100%; height: auto; max-width: 550px;">
            </div>
            <div class="league-selector" style="margin-bottom: 1.5rem;">
                <label for="league-select" style="color: white; margin-right: 0.5rem;">Wybierz ligę:</label>
                <select id="league-select" onchange="changeLeague(this.value)" style="padding: 0.5rem; background: #222; color: white; border: 1px solid #444; border-radius: 4px;">
                    <option value="ekstraklasa">Ekstraklasa</option>
                    <option value="1liga">1. Liga</option>
                </select>
            </div>
            <div class="table-filters" id="table-filters">
                <button class="filter-btn active" onclick="filterTable('all', this)">SEZON</button>
                <button class="filter-btn" onclick="filterTable('home', this)">U SIEBIE</button>
                <button class="filter-btn" onclick="filterTable('away', this)">NA WYJEŹDZIE</button>
            </div>
            <div id="full-table-content"></div>
            <div style="margin-top: 2rem; padding: 1rem; background: rgba(0,0,0,0.5); border-radius: 4px; font-size: 0.9rem;">
                <div style="display: flex; align-items: center; gap: 1rem; color: #aaa;">
                    <div style="width: 30px; height: 30px; background: rgba(220, 20, 60, 0.3); border-left: 3px solid #dc143c;"></div>
                    <span>Spadek z ligi</span>
                </div>
            </div>
        </div>
    </div>

    <div id="article-view" style="display: none;">
        <div class="article-container">
            <div id="article-content"></div>
        </div>
    </div>

    <div class="main-layout" id="clubs-view" style="display: none;">
        <div class="clubs-container">
            <h1 style="color: white; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 2px;">KLUBY</h1>
            <div id="clubs-grid" class="clubs-grid"></div>
        </div>
    </div>

    <div id="club-profile-view" style="display: none;">
        <div id="club-profile-content"></div>
    </div>

    <div id="league-stats-view" style="display: none;">
        <div id="league-stats-content"></div>
    </div>



    <!-- Player Profile Modal -->
    <div id="player-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePlayerModal()">&times;</span>
            <div id="player-modal-body"></div>
        </div>
    </div>

    <div class="main-layout" id="cup-bracket-view" style="display: none;">
        <div class="bracket-container">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="https://i.ibb.co/FkyfzY94/2d771fb9-cae8-4073-b874-7b2487c970bd.png" alt="Puchar Polski" style="height: 80px; object-fit: contain;">
            </div>
            <div id="bracket-content" style="display: flex; justify-content: space-between; gap: 2rem; overflow-x: auto; padding: 2rem;"></div>
        </div>
    </div>

    <div class="main-layout" id="schedule-view" style="display: none;">
        <div class="schedule-container">
            <div class="schedule-header-nav">
                <button class="nav-arrow" onclick="changeRound(-1)">←</button>
                <div class="round-title">18. KOLEJKA</div>
                <button class="nav-arrow" onclick="changeRound(1)">→</button>
            </div>
            <div class="schedule-sponsor">
                <img src="https://i.ibb.co/q6cnb36/7u7logo.png" alt="7u7">
            </div>
            <h2 style="color: white; margin-bottom: 1rem; text-transform: uppercase; margin-top: 2rem;">🔴 Aktualnie na żywo</h2>
            <div id="live-match-container"></div>
            <div id="schedule-content">
                <!-- Wypełniane przez JS -->
            </div>
        </div>
    </div>

    <!-- Pasek z klubami na dole -->
    <div class="clubs-ticker-container">
        <div class="clubs-ticker" id="clubs-ticker">
            <!-- Loga klubów -->
        </div>
    </div>

    <!-- Modal Szczegóły Klubu -->
    <div id="club-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
